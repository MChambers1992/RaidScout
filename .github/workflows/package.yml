name: Package Extension

on:
  push:
    branches: [main, master]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "name=raidrecruiter-plus-${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "name=raidrecruiter-plus-${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Create zip
        run: |
          cd "RaidRecruiter Plus"
          zip -r "../${{ steps.version.outputs.name }}.zip" . \
            --exclude "*.git*" \
            --exclude ".claude/*" \
            --exclude "CLAUDE.md"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.name }}
          path: ${{ steps.version.outputs.name }}.zip
          retention-days: 30

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Build zip
        run: |
          cd "RaidRecruiter Plus"
          zip -r "../raidrecruiter-plus-${{ github.ref_name }}.zip" . \
            --exclude "*.git*" \
            --exclude ".claude/*" \
            --exclude "CLAUDE.md"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: raidrecruiter-plus-${{ github.ref_name }}.zip
          generate_release_notes: true

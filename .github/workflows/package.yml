name: Package Extension

on:
  push:
    branches: [main, master]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          MANIFEST_VERSION=$(jq -r '.version' manifest.json)
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "zip_name=raidscout-${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "release_name=RaidScout ${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
          else
            echo "zip_name=raidscout-v${MANIFEST_VERSION}-${SHORT_SHA}" >> $GITHUB_OUTPUT
            echo "tag=v${MANIFEST_VERSION}-${SHORT_SHA}" >> $GITHUB_OUTPUT
            echo "release_name=RaidScout v${MANIFEST_VERSION} (${SHORT_SHA})" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
          fi

      - name: Create zip
        run: |
          zip -r "${{ steps.version.outputs.zip_name }}.zip" . \
            --exclude "*.git*" \
            --exclude ".claude/*" \
            --exclude ".github/*" \
            --exclude "CLAUDE.md"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.zip_name }}
          path: ${{ steps.version.outputs.zip_name }}.zip
          retention-days: 30

    outputs:
      zip_name: ${{ steps.version.outputs.zip_name }}
      tag: ${{ steps.version.outputs.tag }}
      release_name: ${{ steps.version.outputs.release_name }}
      prerelease: ${{ steps.version.outputs.prerelease }}

  release:
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.zip_name }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.tag }}
          name: ${{ needs.build.outputs.release_name }}
          files: ${{ needs.build.outputs.zip_name }}.zip
          generate_release_notes: true
          prerelease: ${{ needs.build.outputs.prerelease == 'true' }}
